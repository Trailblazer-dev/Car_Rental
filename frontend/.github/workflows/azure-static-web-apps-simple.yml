name: Azure Static Web Apps Simple CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      # Install dependencies with minimal extras
      - name: Install dependencies
        working-directory: ./frontend
        run: |
          npm ci --no-audit --no-fund
      
      # Create React shim files
      - name: Create React shim files
        working-directory: ./frontend
        run: |
          mkdir -p src
          
          # Create React shim
          cat > src/react-shim.js << 'EOL'
          // React shim for proper module resolution in production builds
          import React from 'react';
          export * from 'react';
          export default React;
          EOL
          
          # Create ReactDOM shim
          cat > src/react-dom-shim.js << 'EOL'
          // ReactDOM shim for proper module resolution in production builds
          import ReactDOM from 'react-dom';
          export * from 'react-dom';
          
          // Polyfill for React 18 APIs
          export const createRoot = (container) => ({
            render(element) { ReactDOM.render(element, container); },
            unmount() { ReactDOM.unmountComponentAtNode(container); }
          });
          
          export const hydrateRoot = (container, element) => {
            ReactDOM.hydrate(element, container);
            return { unmount() { ReactDOM.unmountComponentAtNode(container); } };
          };
          
          export default ReactDOM;
          EOL
          
          # Create JSX Runtime shim
          cat > src/jsx-runtime-shim.js << 'EOL'
          // JSX Runtime shim for production builds
          import React from 'react';
          export const jsx = React.createElement;
          export const jsxs = React.createElement; 
          export const Fragment = React.Fragment;
          export default { jsx, jsxs, Fragment };
          EOL
          
          # Create JSX Dev Runtime shim
          cat > src/jsx-dev-runtime-shim.js << 'EOL'
          // JSX Dev Runtime shim for production builds
          import React from 'react';
          export const jsxDEV = React.createElement;
          export const jsxs = React.createElement;
          export const Fragment = React.Fragment;
          export default { jsxDEV, jsxs, Fragment };
          EOL
          
          echo "React shim files created successfully!"
      
      # Create temporary Vite config for Azure build
      - name: Create Azure Vite config
        working-directory: ./frontend
        run: |
          cat > vite.azure.config.js << 'EOL'
          import { defineConfig } from 'vite';
          import react from '@vitejs/plugin-react-swc';
          import { resolve } from 'path';
          
          // Special production configuration for Azure Static Web Apps
          export default defineConfig({
            plugins: [react()],
            resolve: {
              alias: {
                'react': resolve(__dirname, './src/react-shim.js'),
                'react-dom': resolve(__dirname, './src/react-dom-shim.js'),
                'react/jsx-runtime': resolve(__dirname, './src/jsx-runtime-shim.js'),
                'react/jsx-dev-runtime': resolve(__dirname, './src/jsx-dev-runtime-shim.js'),
              }
            },
            build: {
              outDir: 'dist',
              assetsDir: 'assets',
              rollupOptions: {
                output: {
                  manualChunks: undefined,
                  inlineDynamicImports: true
                }
              },
              commonjsOptions: {
                include: [/node_modules/],
                transformMixedEsModules: true
              },
            },
            optimizeDeps: {
              include: ['react', 'react-dom', 'react-router-dom']
            }
          });
          EOL
          
          echo "Azure Vite config created successfully!"
      
      # Build with the Azure-optimized config
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npx vite build --config vite.azure.config.js
        env:
          NODE_ENV: production
      
      # Ensure SWA config exists
      - name: Prepare SWA Config
        working-directory: ./frontend
        run: |
          cp staticwebapp.config.json dist/ || echo "{}" > dist/staticwebapp.config.json
      
      # Deploy using standard SWA action
      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend" 
          output_location: "dist"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
