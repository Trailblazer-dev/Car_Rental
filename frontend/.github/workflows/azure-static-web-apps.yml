name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps --no-audit --no-fund
      
      - name: Prepare React files for Azure
        working-directory: ./frontend
        run: |
          # Create necessary directories
          mkdir -p src/react
          
          # Create JSX runtime file
          cat > src/react/jsx-runtime.ts << 'EOL'
          /**
           * JSX Runtime shim for React/JSX runtime resolution
           */
          import * as React from 'react';
          
          export const jsx = React.createElement;
          export const jsxs = React.createElement;
          export const Fragment = React.Fragment;
          
          export default {
            jsx,
            jsxs,
            Fragment
          };
          EOL
          
          # Create JSX dev runtime file
          cat > src/react/jsx-dev-runtime.ts << 'EOL'
          /**
           * JSX Dev Runtime shim for React/JSX development runtime resolution
           */
          import * as React from 'react';
          
          export const jsxDEV = React.createElement;
          export const jsxs = React.createElement;
          export const Fragment = React.Fragment;
          
          export default {
            jsxDEV,
            jsxs,
            Fragment
          };
          EOL
          
          # Create React index file
          cat > src/react/index.ts << 'EOL'
          /**
           * React main module shim
           */
          import * as React from 'react';
          export * from 'react';
          export default React;
          EOL
          
          # Create React DOM fix file
          cat > src/react-dom-fix.ts << 'EOL'
          /**
           * ReactDOM shim for Azure Static Web Apps
           */
          import * as ReactDOM from 'react-dom';
          
          // Export standard ReactDOM APIs
          export const {
            render, hydrate, unmountComponentAtNode, findDOMNode, createPortal
          } = ReactDOM;
          
          // Create React 18 compatible APIs for older React versions
          export const createRoot = (container) => {
            return {
              render(element) {
                ReactDOM.render(element, container);
              },
              unmount() {
                ReactDOM.unmountComponentAtNode(container);
              }
            };
          };
          
          export const hydrateRoot = (container, element) => {
            ReactDOM.hydrate(element, container);
            return {
              unmount() {
                ReactDOM.unmountComponentAtNode(container);
              }
            };
          };
          
          // Default export
          export default ReactDOM;
          EOL
      
      - name: Copy assets
        working-directory: ./frontend
        run: |
          node scripts/copy-assets.js
      
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          echo "Starting build process..."
          npx vite build --outDir dist --assetsDir assets --emptyOutDir
          if [ -d "dist" ]; then
            echo "Build succeeded, contents of dist:"
            ls -la dist
          else
            echo "Build failed - dist directory not found"
            exit 1
          fi
        env:
          CI: false
          NODE_ENV: production
      
      - name: Copy SWA config
        working-directory: ./frontend
        run: |
          cp staticwebapp.config.json dist/
      
      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend" 
          output_location: "dist"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
