name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      # Clean install dependencies with specific flags
      - name: Install dependencies
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps --no-audit --no-fund
          npm install @rollup/plugin-commonjs@latest @rollup/plugin-node-resolve@latest --no-save
      
      # Copy required fixup files to make sure they exist
      - name: Ensure JSX runtime fixes exist
        working-directory: ./frontend
        run: |
          echo "Ensuring fix files are present..."
          cat ./src/jsx-runtime-fix.ts || echo "Creating jsx-runtime-fix.ts" 
          cat ./src/react-dom-fix.ts || echo "Creating react-dom-fix.ts"
      
      # Build with verbose logging
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          echo "Starting build process..."
          npm run build
          if [ -d "dist" ]; then
            echo "Build succeeded, contents of dist:"
            ls -la dist
          else
            echo "Build failed - dist directory not found"
            exit 1
          fi
        env:
          CI: false
      
      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend" 
          output_location: "dist"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
