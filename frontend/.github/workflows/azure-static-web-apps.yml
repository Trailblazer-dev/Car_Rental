name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      # Install dependencies
      - name: Install dependencies
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps --no-audit --no-fund
      
      # Prepare React files for Azure
      - name: Prepare React files for Azure
        working-directory: ./frontend
        run: |
          mkdir -p src/react
          
          # Create React runtime fix
          cat > src/react-runtime-fix.ts << 'EOL'
          /**
           * Unified React runtime fix for Azure Static Web Apps deployment
           */
          import * as React from 'react';
          import * as ReactDOM from 'react-dom';
          
          // Export all React APIs
          export const {
            useState, useEffect, useContext, useReducer, useCallback, useMemo, useRef,
            createContext, createElement, cloneElement, createRef, Component, PureComponent,
            Children, Fragment, isValidElement, forwardRef, memo,
            useLayoutEffect, useImperativeHandle, useDebugValue
          } = React;
          
          // Export React JSX runtime functions
          export const jsx = React.createElement;
          export const jsxs = React.createElement;
          export const jsxDEV = React.createElement;
          
          // Export ReactDOM APIs
          export const {
            render, hydrate, unmountComponentAtNode, findDOMNode, createPortal
          } = ReactDOM;
          
          // Create React 18 compatible APIs
          export const createRoot = (container) => {
            return {
              render(element) {
                ReactDOM.render(element, container);
              },
              unmount() {
                ReactDOM.unmountComponentAtNode(container);
              }
            };
          };
          
          export const hydrateRoot = (container, element) => {
            ReactDOM.hydrate(element, container);
            return {
              unmount() {
                ReactDOM.unmountComponentAtNode(container);
              }
            };
          };
          
          // Default exports
          export default React;
          export { ReactDOM };
          EOL
          
          # Create JSX runtime shim
          cat > src/react/jsx-runtime.ts << 'EOL'
          /**
           * JSX Runtime shim
           * This ensures proper import resolution for 'react/jsx-runtime'
           */
          import { jsx, jsxs, Fragment } from '../react-runtime-fix';
          
          export { jsx, jsxs, Fragment };
          export default { jsx, jsxs, Fragment };
          EOL
          
          # Create JSX dev runtime shim
          cat > src/react/jsx-dev-runtime.ts << 'EOL'
          /**
           * JSX Dev Runtime shim
           * This ensures proper import resolution for 'react/jsx-dev-runtime'
           */
          import { jsx, jsxs, Fragment } from '../react-runtime-fix';
          
          // jsxDEV is just an alias for jsx in production
          export const jsxDEV = jsx;
          export { jsxs, Fragment };
          export default { jsxDEV, jsxs, Fragment };
          EOL
          
          echo "React files prepared successfully!"
      
      # Run the copy-assets script
      - name: Copy assets
        working-directory: ./frontend
        run: |
          node scripts/copy-assets.js
      
      # Build the application
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          echo "Starting build process..."
          npx vite build --outDir dist --assetsDir assets --emptyOutDir
          if [ -d "dist" ]; then
            echo "Build succeeded, contents of dist:"
            ls -la dist
          else
            echo "Build failed - dist directory not found"
            exit 1
          fi
        env:
          CI: false
          NODE_ENV: production
      
      # Copy the static web app config to dist
      - name: Copy SWA config
        working-directory: ./frontend
        run: |
          cp staticwebapp.config.json dist/
      
      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend" 
          output_location: "dist"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
