name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      # Install dependencies
      - name: Install dependencies
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps --no-audit --no-fund
      
      # Create necessary React shim files
      - name: Create React shim files
        working-directory: ./frontend
        run: |
          mkdir -p src/react
          
          # Create React index file
          cat > src/react/index.ts << 'EOL'
          /**
           * React shim for Azure Static Web Apps
           * Re-exports all React APIs needed by dependencies
           */
          import * as React from 'react';
          
          // Re-export everything from React
          export const {
            useState, useEffect, useContext, useReducer, useCallback, useMemo, useRef,
            createContext, createElement, cloneElement, createRef, Component, PureComponent,
            Children, Fragment, isValidElement, forwardRef, memo,
            useLayoutEffect, useImperativeHandle, useDebugValue
          } = React;
          
          // Export JSX-specific functions
          export const jsx = React.createElement;
          export const jsxs = React.createElement;
          export const jsxDEV = React.createElement;
          
          // Default export
          export default React;
          EOL
          
          # Create JSX runtime file
          cat > src/react/jsx-runtime.ts << 'EOL'
          /**
           * JSX Runtime shim for Azure Static Web Apps
           */
          import * as React from 'react';
          
          // Export the specific JSX runtime APIs
          export const jsx = React.createElement;
          export const jsxs = React.createElement;
          export const Fragment = React.Fragment;
          
          // Default export
          export default { jsx, jsxs, Fragment };
          EOL
          
          # Create JSX dev runtime file
          cat > src/react/jsx-dev-runtime.ts << 'EOL'
          /**
           * JSX Dev Runtime shim for Azure Static Web Apps
           */
          import * as React from 'react';
          
          // Export the specific JSX dev runtime APIs
          export const jsxDEV = React.createElement;
          export const jsxs = React.createElement;
          export const Fragment = React.Fragment;
          
          // Default export
          export default { jsxDEV, jsxs, Fragment };
          EOL
          
          echo "React shim files created successfully!"
      
      # Run prebuild script
      - name: Run prebuild script
        working-directory: ./frontend
        run: |
          npm run prebuild
      
      # Build application
      - name: Build application
        working-directory: ./frontend
        run: |
          npx vite build
        env:
          NODE_ENV: production
      
      # Copy SWA config
      - name: Copy SWA config
        working-directory: ./frontend
        run: |
          cp staticwebapp.config.json dist/
      
      # Deploy to Azure
      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend" 
          output_location: "dist"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
